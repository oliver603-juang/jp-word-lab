<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="日文單字">
<meta name="theme-color" content="#1a0a1e">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-jpw-192.png">
<title>JP Word Lab 日文單字積木</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0d1117;--card:#161b22;--border:#30363d;--gold:#f0c040;--accent:#e05070;--blue:#58a6ff;--green:#3fb950;--red:#f85149;--purple:#bc8cff;--orange:#f0883e;--teal:#3fb9a0;--text:#e6edf3;--dim:#8b949e;--muted:#484f58;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Zen Maru Gothic','Fredoka',sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;overflow-x:hidden;user-select:text;-webkit-user-select:text;}
.top-bar{display:flex;align-items:center;gap:8px;padding:8px 12px;position:sticky;top:0;background:var(--bg);z-index:100;border-bottom:1px solid var(--border);}
.user-btn{padding:5px 14px;border-radius:20px;border:1.5px solid var(--border);background:transparent;color:var(--dim);font-family:inherit;font-size:0.7rem;font-weight:600;cursor:pointer;transition:all 0.2s;}
.user-btn.active{background:var(--gold);color:#1a1a2e;border-color:var(--gold);}
.score-badge{margin-left:auto;padding:5px 14px;border-radius:14px;background:var(--green);color:white;font-size:0.72rem;font-weight:700;}
.layer-tabs{display:flex;gap:6px;padding:6px 12px;overflow-x:auto;-webkit-overflow-scrolling:touch;}.layer-tabs::-webkit-scrollbar{display:none;}
.layer-tab{flex-shrink:0;padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--dim);font-family:inherit;font-size:0.68rem;font-weight:600;cursor:pointer;white-space:nowrap;transition:all 0.2s;}
.layer-tab.active{background:var(--gold);color:#1a1a2e;border-color:var(--gold);transform:scale(1.05);}
.content{padding:10px 12px 80px;}
.rule-card{background:var(--card);border-radius:16px;border:1px solid var(--border);padding:14px;margin-bottom:10px;}
.rule-header{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.rule-emoji{font-size:1.6rem;}.rule-name{font-size:0.95rem;font-weight:700;}
.rule-formula-tag{font-size:0.68rem;color:var(--gold);background:rgba(240,192,64,0.1);padding:3px 10px;border-radius:8px;display:inline-block;margin-top:3px;}
.comic-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin:10px 0;}
.comic-panel{border-radius:10px;padding:10px 8px;text-align:center;position:relative;min-height:68px;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.panel-num{position:absolute;top:4px;left:7px;font-size:0.5rem;font-weight:700;opacity:0.4;}
.panel-emoji{font-size:1.4rem;margin-bottom:3px;}
.panel-text{font-size:0.68rem;font-weight:600;line-height:1.3;color:rgba(0,0,0,0.7);}
.comic-formula-text{text-align:center;font-size:0.68rem;font-weight:700;color:var(--dim);padding:4px 0;}
.blindspot-box{background:rgba(255,255,255,0.02);border-radius:10px;padding:10px;margin-top:8px;}
.bs-label{font-size:0.62rem;color:var(--gold);font-weight:600;margin-bottom:4px;}
.bs-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.bs-cn,.bs-jp{font-size:0.65rem;line-height:1.4;padding:6px;border-radius:8px;}
.bs-cn{background:rgba(224,80,112,0.08);}.bs-jp{background:rgba(88,166,255,0.08);}
.bs-cn b,.bs-jp b{font-size:0.58rem;display:block;margin-bottom:2px;}
.section-label{font-size:0.75rem;font-weight:700;color:var(--dim);margin:14px 0 6px;padding-left:8px;border-left:3px solid var(--gold);}
.word-grid{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px;}
.word-chip{padding:6px 12px;border-radius:12px;background:var(--card);border:1.5px solid var(--border);font-family:inherit;font-size:0.72rem;font-weight:600;cursor:pointer;transition:all 0.2s;color:var(--text);}
.word-chip:hover{transform:scale(1.04);border-color:var(--muted);}
.word-chip.active{border-color:var(--gold);background:rgba(240,192,64,0.08);}
.detail-card{background:rgba(240,192,64,0.04);border:1px solid rgba(240,192,64,0.12);border-radius:14px;padding:14px;margin-top:10px;animation:slideUp 0.25s ease;}
@keyframes slideUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}
.speak-btn{background:none;border:1px solid var(--gold);border-radius:50%;width:28px;height:28px;font-size:0.9rem;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;}
.speak-btn:active{transform:scale(0.88);}
.s{cursor:pointer;font-size:0.65rem;margin-left:2px;}
.block-row{display:flex;align-items:center;justify-content:center;gap:6px;margin:12px 0;flex-wrap:wrap;}
.blk{padding:6px 12px;border-radius:10px;font-size:0.82rem;font-weight:700;color:white;}
.blk-cn{background:var(--accent);}.blk-rule{background:var(--purple);}.blk-jp{background:var(--blue);}.blk-result{background:var(--green);}
.blk-op{font-size:1rem;color:var(--gold);background:none;padding:0;}
.quiz-row{display:flex;gap:6px;justify-content:center;margin-top:10px;flex-wrap:wrap;}
.quiz-opt{padding:8px 16px;border-radius:12px;border:1.5px solid var(--border);background:var(--card);color:var(--text);font-family:inherit;font-size:0.78rem;font-weight:600;cursor:pointer;transition:all 0.15s;}
.quiz-opt:hover{border-color:var(--muted);}
.quiz-opt.correct{border-color:var(--green);background:rgba(63,185,80,0.15);color:var(--green);}
.quiz-opt.wrong{border-color:var(--red);background:rgba(248,81,73,0.1);color:var(--red);}
.progress-row{display:flex;align-items:center;gap:4px;padding:6px 12px;flex-wrap:wrap;}
.pill{width:28px;height:28px;border-radius:50%;border:1.5px solid var(--border);background:transparent;font-size:0.55rem;font-weight:700;color:var(--dim);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.15s;flex-shrink:0;}
.pill.done{border-color:var(--green);color:var(--green);background:rgba(63,185,80,0.1);}
.pill.current{border-color:var(--gold);color:var(--gold);}
.progress-label{margin-left:auto;font-size:0.65rem;color:var(--dim);}
</style>
</head>
<body>
<div class="top-bar">
  <button class="user-btn active" id="btn-iggy" onclick="switchUser('iggy')">🦊 Iggy</button>
  <button class="user-btn" id="btn-yoyo" onclick="switchUser('yoyo')">🐸 Yoyo</button>
  <div class="score-badge" id="score-badge">0 分</div>
</div>
<div class="layer-tabs" id="layer-tabs"></div>
<div class="content" id="content"></div>
<div class="progress-row" id="progress-row"></div>
<script>
function speak(t){if(!('speechSynthesis' in window))return;speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(t);u.lang='ja-JP';u.rate=0.75;speechSynthesis.speak(u);}
function S(t){return '<span class="s" onclick="event.stopPropagation();speak(\''+t.replace(/'/g,"\\'")+'\')" title="'+t+'">🔊</span>';}

let currentUser='iggy',currentRuleIdx=0,selectedWordIdx=-1,totalScore=0,progress={},quizAnswered={};
function loadUserData(){currentUser=localStorage.getItem('jw-user')||'iggy';totalScore=parseInt(localStorage.getItem('jw-'+currentUser+'-score')||'0');progress=JSON.parse(localStorage.getItem('jw-'+currentUser+'-progress')||'{}');quizAnswered=JSON.parse(localStorage.getItem('jw-'+currentUser+'-quiz')||'{}');document.querySelectorAll('.user-btn').forEach(b=>b.classList.remove('active'));document.getElementById('btn-'+currentUser)?.classList.add('active');updateScore();}
function saveUserData(){localStorage.setItem('jw-user',currentUser);localStorage.setItem('jw-'+currentUser+'-score',totalScore);localStorage.setItem('jw-'+currentUser+'-progress',JSON.stringify(progress));localStorage.setItem('jw-'+currentUser+'-quiz',JSON.stringify(quizAnswered));}
function switchUser(uid){currentUser=uid;localStorage.setItem('jw-user',uid);loadUserData();selectedWordIdx=-1;render();}
function updateScore(){document.getElementById('score-badge').textContent=totalScore+' 分';}
function handleQuiz(wk,ch,co){if(quizAnswered[wk])return;quizAnswered[wk]=ch;if(ch===co){totalScore+=10;progress[wk]='correct';}else{progress[wk]='wrong';}saveUserData();updateScore();renderContent();renderProgress();}
function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}

function render(){renderTabs();renderContent();renderProgress();}
function renderTabs(){document.getElementById('layer-tabs').innerHTML=RULES.map((r,i)=>'<button class="layer-tab'+(i===currentRuleIdx?' active':'')+'" onclick="currentRuleIdx='+i+';selectedWordIdx=-1;render();">'+r.emoji+' '+r.name.split(' ')[0]+'</button>').join('');}

function renderContent(){
  const r=RULES[currentRuleIdx],c=r.comic;
  let h='<div class="rule-card"><div class="rule-header"><span class="rule-emoji">'+r.emoji+'</span><div><div class="rule-name">'+r.name+'</div><span class="rule-formula-tag">'+r.formula+'</span></div></div>';
  h+='<div class="comic-grid">'+c.panels.map((p,i)=>'<div class="comic-panel" style="background:'+p.color+';border:1px solid '+p.border+'"><div class="panel-num">'+(i+1)+'</div><div class="panel-emoji">'+p.emoji+'</div><div class="panel-text">'+p.text+'</div></div>').join('')+'</div>';
  h+='<div class="comic-formula-text">'+c.formula+'</div>';
  h+='<div class="blindspot-box"><div class="bs-label">💡 中日文思維差異</div><div class="bs-grid"><div class="bs-cn"><b>🇹🇼 中文</b>'+r.blindspot.cn+'</div><div class="bs-jp"><b>🇯🇵 日文</b>'+r.blindspot.jp+'</div></div></div></div>';
  h+='<div class="section-label">📚 練習單字（'+r.words.length+' 字）</div>';
  h+='<div class="word-grid">'+r.words.map((w,i)=>{const d=progress[w.id]==='correct';return '<button class="word-chip'+(i===selectedWordIdx?' active':'')+'" onclick="selectedWordIdx='+i+';renderContent();renderProgress();" style="'+(d?'border-color:var(--green);':'')+'">'+(d?'✅ ':'')+(w.chinese||w.kanji)+'</button>';}).join('')+'</div>';

  if(selectedWordIdx>=0){
    const w=r.words[selectedWordIdx],ans=quizAnswered[w.id],correct=w.quizAnswer;
    h+='<div class="detail-card">';

    if(w.quizType==='onyomi'){
      const opts=shuffle([w.quizAnswer,...w.distractors]);
      h+='<div style="text-align:center;font-size:1.3rem;font-weight:700;margin:8px 0;">'+w.kanji+' '+S(w.reading)+'</div>';
      h+='<div style="text-align:center;font-size:0.75rem;color:var(--dim);">中文：'+w.cn+'</div>';
      h+='<div style="text-align:center;font-size:0.72rem;color:var(--gold);margin:8px 0;">🧪 '+w.quizQ+'</div>';
      h+='<div class="quiz-row">'+opts.map(o=>{let cl='quiz-opt';if(ans){if(o===correct)cl+=' correct';else if(o===ans)cl+=' wrong';}return '<button class="'+cl+'" onclick="handleQuiz(\''+w.id+'\',\''+o+'\',\''+correct+'\')"'+(ans?' disabled':'')+'>'+o+' '+S(o)+'</button>';}).join('')+'</div>';
    }else if(w.quizType==='compound'){
      const opts=shuffle([w.quizAnswer,...w.distractors]);
      h+='<div style="text-align:center;margin:8px 0;"><span style="font-size:1.1rem;font-weight:700;color:var(--blue);">'+w.base+'</span><span style="font-size:1.1rem;font-weight:700;color:var(--gold);margin:0 4px;">+ ?</span><span style="font-size:1.1rem;font-weight:700;color:var(--dim);">→</span><span style="font-size:1.1rem;font-weight:700;margin-left:4px;">'+w.chinese+'</span></div>';
      h+='<div style="text-align:center;font-size:0.72rem;color:var(--gold);margin:8px 0;">🧪 '+w.quizQ+'</div>';
      h+='<div class="quiz-row">'+opts.map(o=>{let cl='quiz-opt';if(ans){if(o===correct)cl+=' correct';else if(o===ans)cl+=' wrong';}return '<button class="'+cl+'" onclick="handleQuiz(\''+w.id+'\',\''+o+'\',\''+correct+'\')"'+(ans?' disabled':'')+'>'+o+' '+S(o)+'</button>';}).join('')+'</div>';
    }else if(w.quizType==='kanji'){
      const opts=shuffle([w.quizAnswer,...w.distractors]);
      h+='<div style="text-align:center;font-size:1.3rem;font-weight:700;margin:8px 0;">'+w.kanji+' '+S(w.reading)+'</div>';
      h+='<div style="text-align:center;font-size:0.72rem;color:var(--gold);margin:8px 0;">🧪 '+w.quizQ+'</div>';
      h+='<div class="quiz-row">'+opts.map(o=>{let cl='quiz-opt';if(ans){if(o===correct)cl+=' correct';else if(o===ans)cl+=' wrong';}return '<button class="'+cl+'" onclick="handleQuiz(\''+w.id+'\',\''+o+'\',\''+correct+'\')"'+(ans?' disabled':'')+'>'+o+'</button>';}).join('')+'</div>';
    }else if(w.quizType==='morphology'){
      const opts=shuffle([w.quizAnswer,...w.distractors]);
      h+='<div style="text-align:center;margin:8px 0;"><span style="font-size:1.1rem;font-weight:700;color:var(--blue);">'+w.base+'</span><span style="font-size:1.1rem;font-weight:700;color:var(--gold);margin:0 4px;">→ ?</span></div>';
      h+='<div style="text-align:center;font-size:0.8rem;color:var(--dim);">'+w.chinese+'</div>';
      h+='<div style="text-align:center;font-size:0.72rem;color:var(--gold);margin:8px 0;">🧪 '+w.quizQ+'</div>';
      h+='<div class="quiz-row">'+opts.map(o=>{let cl='quiz-opt';if(ans){if(o===correct)cl+=' correct';else if(o===ans)cl+=' wrong';}return '<button class="'+cl+'" onclick="handleQuiz(\''+w.id+'\',\''+o+'\',\''+correct+'\')"'+(ans?' disabled':'')+'>'+o+' '+S(o)+'</button>';}).join('')+'</div>';
    }

    if(ans){
      const isC=ans===correct;
      h+='<div style="text-align:center;margin-top:10px;font-size:0.75rem;color:'+(isC?'var(--green)':'var(--red)')+';">'+(isC?'✅ 正確！':'❌ 正確答案：'+correct)+'</div>';
      if(w.hint)h+='<div style="text-align:center;font-size:0.68rem;color:var(--dim);margin:4px 0;">'+w.hint+'</div>';
      if(w.word)h+='<div style="text-align:center;margin:8px 0;font-size:1rem;font-weight:700;">'+w.word+' '+S(w.word)+'</div>';
      if(w.reading)h+='<div style="text-align:center;margin:8px 0;font-size:1rem;font-weight:700;">'+w.kanji+'（'+w.reading+'）'+S(w.reading)+'</div>';
    }
    h+='</div>';
  }
  document.getElementById('content').innerHTML=h;
}

function renderProgress(){const r=RULES[currentRuleIdx];const done=r.words.filter(w=>progress[w.id]==='correct').length;document.getElementById('progress-row').innerHTML=r.words.map((w,i)=>{const d=progress[w.id]==='correct';return '<button class="pill'+(d?' done':'')+(i===selectedWordIdx?' current':'')+'" onclick="selectedWordIdx='+i+';renderContent();renderProgress();">'+(i+1)+'</button>';}).join('')+'<span class="progress-label">'+done+'/'+r.words.length+'</span>';}

loadUserData();render();
if('serviceWorker' in navigator){navigator.serviceWorker.register('./sw.js').catch(()=>{});}
</script>
